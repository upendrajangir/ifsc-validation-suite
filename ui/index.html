<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFSC Validator</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2DD4BF',
            secondary: '#0891B2',
            accent: '#06B6D4',
          },
          fontFamily: {
            'mono': ['JetBrains Mono', 'Monaco', 'Consolas', 'monospace'],
            'sans': ['JetBrains Mono', 'Monaco', 'Consolas', 'monospace']
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'gradient': 'gradient 3s ease infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            gradient: {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' }
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2DD4BF">
</head>
<body class="font-mono bg-gradient-to-br from-teal-50 to-cyan-50 min-h-screen flex items-center justify-center p-4">

<main class="w-full max-w-md mx-auto">

  <!-- Pure Icon Logo -->
  <div class="text-center mb-12">
    <div class="w-20 h-20 bg-gradient-to-r from-primary to-secondary rounded-3xl mx-auto flex items-center justify-center shadow-2xl animate-float relative overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-r from-primary via-accent to-secondary animate-gradient bg-[length:200%_200%]"></div>
      <i class="ri-bank-line text-white text-3xl relative z-10"></i>
    </div>
  </div>

  <!-- Validator Card -->
  <div class="bg-white/90 backdrop-blur-sm rounded-3xl p-8 shadow-xl border border-white/50">
    <div class="space-y-6">

      <!-- Input with JetBrains Mono -->
      <div class="relative group">
        <input
          type="text"
          id="ifscInput"
          placeholder="SBIN0001234"
          class="w-full px-6 py-5 text-lg font-mono font-medium border-2 border-gray-200 rounded-2xl focus:outline-none focus:border-primary focus:ring-0 uppercase transition-all duration-300 placeholder:text-gray-400 placeholder:font-mono group-hover:border-gray-300 tracking-wider"
          maxlength="11"
        >
        <div class="absolute right-5 top-1/2 transform -translate-y-1/2 transition-colors duration-300 group-hover:text-primary">
          <i class="ri-bank-line text-gray-400 text-xl"></i>
        </div>
      </div>

      <div id="inputError" class="text-red-500 text-sm font-mono font-medium hidden">
        <i class="ri-error-warning-line mr-2"></i>
        <span>invalid_ifsc_code</span>
      </div>

      <!-- Button with JetBrains Mono -->
      <button
        id="validateBtn"
        class="w-full bg-gradient-to-r from-primary to-secondary text-white py-5 rounded-2xl font-mono font-bold text-lg hover:from-secondary hover:to-primary hover:-translate-y-1 transition-all duration-300 shadow-lg hover:shadow-xl active:scale-95 relative overflow-hidden tracking-wide"
      >
        <div class="absolute inset-0 bg-gradient-to-r from-white/0 via-white/20 to-white/0 -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
        <span id="btnText" class="flex items-center justify-center relative z-10">
          <i class="ri-search-line mr-3 text-xl"></i>
          validate()
        </span>
        <div id="btnLoader" class="hidden flex items-center justify-center relative z-10">
          <i class="ri-loader-4-line animate-spin mr-3 text-xl"></i>
          checking...
        </div>
      </button>
    </div>
  </div>

</main>

<script src="js/app.js"></script>
</body>
</html>
